<div class="p-6 md:p-10 bg-[#FDFBF7] min-h-screen font-sans">
  
  <header class="mb-12 flex items-center justify-between border-b border-amber-200 pb-8">
    <div>
      <h1 class="text-4xl font-black text-slate-900 tracking-tighter uppercase">
        Análisis de <span class="text-amber-500">Tendencias</span>
      </h1>
      <p class="text-slate-500 text-sm font-medium mt-1 tracking-wide italic">Métricas de popularidad y alcance </p>
    </div>
    <button (click)="refrescarGraficos()" class="bg-white border-2 border-amber-100 text-amber-600 p-3 rounded-2xl shadow-sm hover:border-amber-400 active:scale-95 transition-all">
      🔄
    </button>
  </header>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 mb-10">
      <div class="bg-white p-2 rounded-[2.5rem] shadow-2xl border border-amber-50 overflow-hidden shadow-amber-900/5 transition-all hover:border-amber-200">
        <div class="px-8 py-5 border-b border-amber-50 bg-gradient-to-r from-white to-amber-50/30">
          <h2 class="text-sm font-bold text-slate-800 uppercase tracking-tighter flex items-center gap-2">
            Top 10 Álbumes Spotify
          </h2>
        </div>
        <div class="p-6 bg-white">
          <div id="chart-tendencias" style="height: 500px; width: 100%;"></div>
        </div>
      </div>



    <div class="flex flex-col gap-4">
      <div class="bg-white p-6 rounded-[2rem] border border-amber-100 shadow-sm">
        <label class="block mb-2 text-xs font-black text-amber-800 uppercase tracking-widest">Seleccionar Artista:</label>
        <select (change)="aplicarFiltroChart2($event)" class="w-full p-3 bg-amber-50/30 border-2 border-amber-100 text-slate-700 text-sm font-bold rounded-2xl outline-none cursor-pointer">
          <option value="TODOS">-- Todos los Artistas --</option>
          <option value="Taylor Swift">Taylor Swift</option>
          <option value="Billie Eilish">Billie Eilish</option>
          <option value="The Weeknd">The Weeknd</option>
          <option value="Ariana Grande">Ariana Grande</option>
          <option value="Drake">Drake</option>
          <option value="Bad Bunny">Bad Bunny</option>
          <option value="Justin Bieber">Justin Bieber</option>
          <option value="Bruno Mars">Bruno Mars</option>
          <option value="Rihanna">Rihanna</option>
          <option value="Sabrina Carpenter">Sabrina Carpenter</option>
        </select>
      </div>

      <div class="bg-white p-2 rounded-[2.5rem] shadow-2xl border border-amber-50 overflow-hidden shadow-amber-900/5 transition-all hover:border-amber-200">
        <div class="px-8 py-5 border-b border-amber-50 bg-gradient-to-r from-white to-amber-50/30">
          <h2 class="text-sm font-bold text-slate-800 uppercase tracking-tighter flex items-center gap-2">
            Métricas de Seguidores
          </h2>
        </div>
        <div class="p-6 bg-white">
          <div id="chart-seguidores" style="height: 500px; width: 100%;"></div>
        </div>
      </div>
    </div>

  </div>
</div>
