<div class="p-4 md:p-10 bg-[#FDFBF7] min-h-screen font-sans">
  <header class="mb-10 border-b border-amber-200 pb-6">
    <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase">
      Tonecu<span class="text-amber-500">.</span> Analytics
    </h1>
    <p class="text-slate-500 text-sm font-medium mt-1 italic">Panel de Control de Géneros Musicales</p>
  </header>

  <div class="mb-8 p-6 bg-white rounded-3xl shadow-[0_15px_40px_-15px_rgba(217,119,6,0.15)] border border-amber-100 relative overflow-hidden">
    <div class="absolute -top-10 -right-10 w-32 h-32 bg-amber-50 rounded-full blur-2xl opacity-60"></div>

    <label for="filtroGenero" class="block mb-3 text-xs font-black text-amber-800 uppercase tracking-widest relative z-10">
      Selecciona un Género para filtrar los datos:
    </label>
    
    <div class="flex flex-col md:flex-row gap-4 relative z-10">
      <select 
        id="filtroGenero" 
        (change)="aplicarFiltro($event)"
        class="w-full md:w-96 p-3.5 bg-amber-50/50 border-2 border-amber-100 text-slate-700 text-sm font-bold rounded-2xl focus:ring-4 focus:ring-amber-500/10 focus:border-amber-400 shadow-sm transition-all appearance-none cursor-pointer">
        
        <option value="TODOS">-- Todos los Géneros --</option>
        <option value="pop">Pop</option>
        <option value="country, pop, indie, folk">Country, Pop, Indie, Folk</option>
        <option value="soundtrack">Soundtrack</option>
        <option value="soft pop">Soft Pop</option>
        <option value="rap">Rap</option>
        <option value="alternative pop, indie pop">Alternative Pop, Indie Pop</option>
        <option value="k-pop">K-Pop</option>
        <option value="dark r&b">Dark R&B</option>
      </select>

      <button 
        (click)="refrescarGrafico()" 
        class="bg-gradient-to-r from-amber-400 via-amber-500 to-amber-600 hover:from-amber-500 hover:to-amber-700 text-white font-black px-8 py-3.5 rounded-2xl transition-all shadow-[0_8px_20px_-5px_rgba(217,119,6,0.4)] active:scale-95 flex items-center justify-center gap-2">
        <span>🔄 Actualizar Gráficos</span>
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 gap-10">
    <div class="bg-white p-2 rounded-[2.5rem] shadow-2xl border border-amber-50 overflow-hidden shadow-amber-900/5">
      <div class="px-8 py-5 border-b border-amber-50 bg-gradient-to-r from-white to-amber-50/30 flex items-center justify-between">
        <h3 class="text-sm font-bold text-slate-800 flex items-center uppercase tracking-tighter">
          <span class="w-3 h-3 bg-amber-500 rounded-full mr-3 shadow-[0_0_10px_rgba(245,158,11,0.6)] animate-pulse"></span> 
          Gráfico de Popularidad
        </h3>
        
      </div>
      
      <div class="p-6 md:p-10 bg-white">
        <div id="chart" style="height: 450px; width: 100%;"></div>
      </div>
    </div>
  </div>
</div>
